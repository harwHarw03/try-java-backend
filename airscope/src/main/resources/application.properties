# =============================================
# AirScope Application Configuration
# =============================================

# --- Server ---
server.port=8080

# --- PostgreSQL Database ---
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/airscope}
spring.datasource.username=${POSTGRES_USER:airscope_user}
spring.datasource.password=${POSTGRES_PASSWORD:airscope_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# "update" = auto-update schema on startup (good for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Settings ---
# Secret key (MUST be set via environment variable in production!)
jwt.secret=${JWT_SECRET:airscope-dev-secret-key-change-in-production-must-be-256-bits}
# Token expiration: 24 hours in milliseconds
jwt.expiration=${JWT_EXPIRATION:86400000}
# Refresh token expiration: 7 days
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# --- AWS DynamoDB ---
aws.region=${AWS_REGION:ap-northeast-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
# Set to true to use DynamoDB Local for development/testing
aws.dynamodb.local=${DYNAMODB_LOCAL:true}
aws.dynamodb.local.endpoint=${DYNAMODB_LOCAL_ENDPOINT:http://localhost:8000}

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# --- Logging ---
logging.level.com.airscope=DEBUG
logging.level.org.springframework.security=INFO

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
